schemaVersion: "1"
kind: mixin
name: ruff-lint
displayName: Ruff Linter
description: |
  Installs the ruff Python linter/formatter and drops a shared ruff.toml into
  the workspace. The agent is instructed via agentContext to run ruff before
  every commit. Stackable with other mixins such as cage-policy.

commands:
  install:
    # uv tool install runs once at sandbox creation time (not on every start).
    # user: "1000" runs it as the agent user so the tool lands in the agent's home.
    - command: "uv tool install ruff@latest"
      user: "1000"

# The shared ruff config is deployed automatically: any file under files/workspace/
# is copied as-is into the sandbox workspace. No initFiles entry is needed for static
# files (initFiles is for files with inline, runtime-computed content).

network:
  allowedDomains:
    - pypi.org
    - files.pythonhosted.org
    - astral.sh   # uv/ruff release metadata

agentContext: |
  ## Linting
  ruff is installed and configured. Before committing any Python changes:
    ruff check .         # lint
    ruff format .        # format
  Config lives at /workspace/ruff.toml. Fix all errors before committing.
