schemaVersion: "1"
kind: mixin
name: cage-policy
displayName: Proxy-Injected Credential (as code)
description: |
  Declares a proxy-injected service credential as reviewable code: the real
  secret stays in the host keychain, the agent only ever sees the decoy string
  "proxy-managed", and the proxy attaches the real token to outbound requests.

  Network allow/deny rules are intentionally NOT declared here. In any governed
  enterprise, org-level governance owns network (and filesystem) access and
  overrides kit-level network rules entirely — so a kit allowlist is just noise.
  Put the network cage in org governance; keep credential injection — which org
  governance does NOT manage — in the kit.

network:
  # serviceDomains + serviceAuth below are credential PLUMBING, not a network
  # cage: they tell the proxy which upstream to attach the credential to, and how.
  # serviceDomains groups an upstream behind a logical service name.
  serviceDomains:
    api.example.com: example

  # serviceAuth rewrites the named header on every outbound request to the
  # mapped domain. The agent never sees the real token value.
  serviceAuth:
    example:
      headerName: Authorization
      valueFormat: "Bearer %s"

credentials:
  sources:
    # "env" lists the host-side environment variable(s) that hold the secret.
    # The proxy reads this value at request time; it is never written into the VM.
    example:
      env:
        - EXAMPLE_API_KEY

environment:
  # proxyManaged variables are set to the literal string "proxy-managed" inside
  # the VM. The proxy replaces the value on outbound requests automatically.
  proxyManaged:
    - EXAMPLE_API_KEY
